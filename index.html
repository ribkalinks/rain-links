<!DOCTYPE html>
<html>
<head>
<title>Rain Links</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}

/* animasi muncul */
.container{
    width:320px;
    text-align:center;
    animation: fadeIn 1.5s ease;
}

/* kartu glass effect */
.card{
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.15);
    border-radius:20px;
    padding:30px;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

/* foto profil */
img{
    width:120px;
    border-radius:50%;
    margin-bottom:10px;
}

/* tombol link */
.link{
    display:block;
    margin:15px 0;
    padding:14px;
    text-decoration:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
    border:2px solid rgba(255,255,255,0.4);
    transition:0.3s;
}

/* neon glow */
.link:hover{
    background:white;
    color:#333;
    box-shadow:0 0 15px white;
    transform:scale(1.05);
}

/* animasi fade */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<img src="ribka.jpg">

<h1>Ribka Ariyanti</h1>

<p>Welcome to my links ✨</p>

<a class="link" href="https://instagram.com/ryanti_ryn">
📸 Instagram
</a>

<a class="link" href="https://wa.me/6282336566741">
💬 WhatsApp
</a>

<a class="link" href="https://facebook.com/ribkaariyanti">
👍 Facebook
</a>

</div>

</div>

</body>
</html>
